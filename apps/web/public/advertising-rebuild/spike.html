<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nexus Advertising — Rebuild Design Spike</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#0f172a; --ink2:#475569; --ink3:#94a3b8;
    --line:#e6e8ec; --line2:#eef0f3; --brand:#4f46e5; --brand-soft:#eef2ff;
    --green:#16a34a; --green-soft:#e8f6ee; --red:#dc2626; --red-soft:#fdecec;
    --amber:#d97706; --amber-soft:#fdf3e6; --blue:#2563eb; --slate:#64748b;
    --az:#ff9900; --az-soft:#fff4e0; --ebay:#0064d2; --ebay-soft:#e7f0fc; --shop:#5a8f3c; --shop-soft:#edf5e7;
    --radius:10px; --shadow:0 1px 2px rgba(15,23,42,.04),0 1px 1px rgba(15,23,42,.03);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  svg{vertical-align:middle}
  .app{display:grid;grid-template-columns:224px 1fr;height:100vh;overflow:hidden}

  /* SIDEBAR */
  .side{background:#0f1729;color:#cbd5e1;display:flex;flex-direction:column;border-right:1px solid #0b1120}
  .brand{display:flex;align-items:center;gap:9px;padding:16px 16px 14px;color:#fff;font-weight:700;font-size:14px;letter-spacing:.2px}
  .brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#6366f1,#4f46e5);display:grid;place-items:center;font-size:14px}
  .brand small{display:block;color:#64748b;font-weight:500;font-size:10.5px;letter-spacing:.3px;text-transform:uppercase}
  .nav{padding:6px 10px;flex:1;overflow:auto}
  .nav .grp{color:#475569;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:14px 10px 6px}
  .nav a{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:#cbd5e1;text-decoration:none;font-weight:500;cursor:pointer;position:relative}
  .nav a svg{width:17px;height:17px;stroke:#94a3b8;flex:none}
  .nav a:hover{background:#1e293b;color:#fff}
  .nav a:hover svg{stroke:#cbd5e1}
  .nav a.on{background:var(--brand);color:#fff}
  .nav a.on svg{stroke:#fff}
  .nav a .ph{margin-left:auto;font-size:9px;color:#64748b;background:#1e293b;border-radius:5px;padding:2px 6px;font-weight:600}
  .nav a .ct{margin-left:auto;font-size:10px;color:#fff;background:var(--red);border-radius:9px;padding:1px 7px;font-weight:700}
  .nav a.on .ph{background:rgba(255,255,255,.18);color:#e0e7ff}
  .side .foot{border-top:1px solid #1e293b;padding:10px 14px;display:flex;align-items:center;gap:9px;color:#94a3b8}
  .side .foot .av{width:26px;height:26px;border-radius:50%;background:#334155;display:grid;place-items:center;color:#e2e8f0;font-weight:700;font-size:11px}

  /* MAIN */
  .main{display:flex;flex-direction:column;overflow:hidden}
  .top{display:flex;align-items:center;gap:10px;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);flex:none}
  .top h1{font-size:15px;margin:0;font-weight:700}
  .top .sub{color:var(--ink3);font-size:11.5px}
  .spacer{flex:1}
  .ctl{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;color:var(--ink2);font-weight:600;cursor:pointer;font-size:12px}
  .ctl svg{width:14px;height:14px;stroke:var(--slate)}
  .ctl.acc{background:var(--brand);border-color:var(--brand);color:#fff}
  .ctl.acc svg{stroke:#fff}
  .chips{display:flex;gap:6px}
  .chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 11px;font-weight:600;font-size:11.5px;color:var(--ink2);cursor:pointer}
  .chip .d{width:7px;height:7px;border-radius:50%}
  .chip.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
  .chip.off{opacity:.5}
  .scroll{overflow:auto;padding:18px;flex:1}
  .view{display:none}
  .view.on{display:block}

  /* generic */
  .grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card .hd{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line2);font-weight:700;font-size:12.5px}
  .card .hd .mut{color:var(--ink3);font-weight:500;font-size:11px}
  .card .bd{padding:14px}
  .kpi{padding:14px 15px}
  .kpi .lbl{color:var(--ink3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:6px}
  .kpi .val{font-size:23px;font-weight:750;margin-top:8px;letter-spacing:-.4px}
  .kpi .dlt{font-size:11.5px;font-weight:700;margin-top:5px;display:inline-flex;align-items:center;gap:4px}
  .up{color:var(--green)} .down{color:var(--red)}
  .pill{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:2px 8px;font-weight:700;font-size:11px}
  .pill.g{background:var(--green-soft);color:var(--green)} .pill.r{background:var(--red-soft);color:var(--red)}
  .pill.a{background:var(--amber-soft);color:var(--amber)} .pill.b{background:var(--brand-soft);color:var(--brand)}
  .pill.n{background:#f1f5f9;color:var(--slate)}
  .cc{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:2px 7px;font-weight:700;font-size:10.5px}
  .cc.az{background:var(--az-soft);color:#b45309} .cc.ebay{background:var(--ebay-soft);color:var(--ebay)} .cc.shop{background:var(--shop-soft);color:var(--shop)}
  .cc .d{width:6px;height:6px;border-radius:50%}

  /* tables */
  table{width:100%;border-collapse:collapse;font-size:12px}
  thead th{position:sticky;top:0;background:#fbfcfd;text-align:right;color:var(--ink3);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap;z-index:1}
  thead th.l{text-align:left}
  tbody td{padding:9px 10px;border-bottom:1px solid var(--line2);text-align:right;white-space:nowrap}
  tbody td.l{text-align:left}
  tbody tr:hover{background:#fafbff}
  .num{font-variant-numeric:tabular-nums;font-weight:600}
  .acos-good{color:var(--green);font-weight:700} .acos-bad{color:var(--red);font-weight:700} .acos-mid{color:var(--amber);font-weight:700}
  .cname{font-weight:650;color:var(--ink)} .csub{color:var(--ink3);font-size:11px}
  .ck{display:flex;align-items:center;gap:9px}
  .thumb{width:30px;height:30px;border-radius:7px;flex:none;background:#e2e8f0;display:grid;place-items:center;font-size:15px}
  .bar{height:6px;border-radius:4px;background:#eef0f3;overflow:hidden;width:70px;display:inline-block;vertical-align:middle}
  .bar i{display:block;height:100%;border-radius:4px}
  .bidbox{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-weight:700;font-variant-numeric:tabular-nums;background:#fff}
  .mult{display:inline-flex;align-items:center;gap:3px;border-radius:6px;padding:2px 6px;font-weight:700;font-size:11px;background:#f1f5f9;color:var(--slate)}
  .mult.pos{background:var(--green-soft);color:var(--green)}
  .matchbadge{font-size:10px;font-weight:800;letter-spacing:.4px;border-radius:4px;padding:1px 5px}
  .mt-exact{background:#ede9fe;color:#6d28d9}.mt-phrase{background:#dbeafe;color:#1d4ed8}.mt-broad{background:#dcfce7;color:#15803d}.mt-auto{background:#f1f5f9;color:#64748b}

  .toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .seg{display:inline-flex;background:#eef0f3;border-radius:8px;padding:3px}
  .seg button{border:0;background:transparent;padding:6px 12px;border-radius:6px;font-weight:700;color:var(--ink2);cursor:pointer;font-size:12px}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .search{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:8px;padding:6px 10px;background:#fff;min-width:230px;color:var(--ink3)}
  .search input{border:0;outline:0;font:inherit;flex:1;color:var(--ink)}
  .bulkbar{display:none;align-items:center;gap:10px;background:#0f1729;color:#fff;border-radius:10px;padding:9px 14px;margin-bottom:12px;font-weight:600;font-size:12px}
  .bulkbar .gho{border:1px solid #334155;background:#1e293b;color:#e2e8f0;border-radius:7px;padding:5px 11px;cursor:pointer;font-weight:600}
  .expander{cursor:pointer;color:var(--ink3);user-select:none;font-size:11px;width:12px;display:inline-block}
  .subrow td{background:#fafbfd}
  .alert{display:flex;gap:11px;align-items:flex-start;padding:11px 13px;border-bottom:1px solid var(--line2)}
  .alert:last-child{border-bottom:0}
  .alert .ic{width:28px;height:28px;border-radius:8px;flex:none;display:grid;place-items:center}
  .alert .t{font-weight:650} .alert .s{color:var(--ink3);font-size:11.5px;margin-top:2px}

  /* suggestions */
  .sugtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .sugtab{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;cursor:pointer;font-weight:650;color:var(--ink2)}
  .sugtab svg{width:15px;height:15px;stroke:var(--slate)}
  .sugtab.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
  .sugtab.on svg{stroke:var(--brand)}
  .sugtab .n{background:#0f1729;color:#fff;border-radius:9px;padding:1px 8px;font-size:11px;font-weight:800}
  .sugtab.on .n{background:var(--brand)}
  .sugrow{display:grid;grid-template-columns:24px 1fr auto auto;gap:14px;align-items:center;padding:13px 15px;border-bottom:1px solid var(--line2)}
  .sugrow:hover{background:#fafbff}
  .sugrow .ttl{font-weight:700}
  .sugrow .why{color:var(--ink2);font-size:12px;margin-top:3px}
  .sugrow .meta{color:var(--ink3);font-size:11px;margin-top:5px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .impact{text-align:right} .impact .big{font-weight:800;font-size:14px} .impact .lab{color:var(--ink3);font-size:10.5px;text-transform:uppercase;letter-spacing:.3px}
  .sugact{display:flex;gap:7px}
  .btn{border-radius:8px;padding:7px 13px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink2);display:inline-flex;align-items:center;gap:6px}
  .btn svg{width:14px;height:14px}
  .btn.ok{background:var(--green);border-color:var(--green);color:#fff}
  .btn.no{background:#fff;color:var(--slate)}
  .btn.sm{padding:5px 10px;font-size:11.5px}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-weight:650;color:var(--ink2);font-size:12px;cursor:pointer}
  .sw{width:34px;height:19px;border-radius:20px;background:#cbd5e1;position:relative;transition:.15s;flex:none}
  .sw i{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .toggle.on .sw{background:var(--green)} .toggle.on .sw i{left:17px}
  .ai-banner{display:flex;align-items:center;gap:11px;background:linear-gradient(90deg,#eef2ff,#faf5ff);border:1px solid #e0e7ff;border-radius:10px;padding:12px 15px;margin-bottom:14px}
  .ai-banner .sp{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#818cf8,#a855f7);display:grid;place-items:center;flex:none}

  /* cockpit */
  .placewrap{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .placecard{border:1px solid var(--line);border-radius:9px;padding:12px}
  .placecard .pn{font-weight:700;font-size:12px;display:flex;align-items:center;gap:7px}
  .placecard .pn svg{width:14px;height:14px}
  .placecard .pv{font-size:20px;font-weight:750;margin-top:6px}
  .placecard .pr{color:var(--ink3);font-size:11px;margin-top:4px}
  .tabline{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:0}
  .tabline button{border:0;background:transparent;padding:11px 14px;font-weight:700;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tabline button.on{color:var(--brand);border-color:var(--brand)}
  .note{font-size:11px;color:var(--ink3)}
  .legend{color:var(--ink3);font-size:11px;display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;align-items:center}
  .legend b{color:var(--ink2)}
  .legend .d{width:8px;height:8px;border-radius:50%;display:inline-block}

  /* copilot */
  .cop-btn{position:fixed;right:22px;bottom:22px;z-index:40;background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;border:0;border-radius:30px;padding:13px 18px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(79,70,229,.4);display:flex;gap:9px;align-items:center}
  .cop-btn svg{width:16px;height:16px}
  .cop{position:fixed;top:0;right:-460px;width:430px;height:100vh;background:#fff;border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(15,23,42,.12);z-index:50;transition:right .22s;display:flex;flex-direction:column}
  .cop.on{right:0}
  .cop .ch{display:flex;align-items:center;gap:9px;padding:15px 17px;border-bottom:1px solid var(--line);font-weight:700}
  .cop .ch .x{margin-left:auto;cursor:pointer;color:var(--ink3);font-size:18px}
  .cop .body{flex:1;overflow:auto;padding:16px}
  .msg{margin-bottom:14px}
  .msg.u{text-align:right}
  .msg .b{display:inline-block;max-width:86%;padding:10px 13px;border-radius:12px;font-size:12.5px;text-align:left}
  .msg.u .b{background:var(--brand);color:#fff;border-bottom-right-radius:4px}
  .msg.a .b{background:#f1f5f9;color:var(--ink);border-bottom-left-radius:4px}
  .cop .actcard{border:1px solid #e0e7ff;background:#f8f9ff;border-radius:10px;padding:11px;margin-top:9px}
  .cop .ghosthint{color:var(--ink3);font-size:11px;margin-top:4px}
  .cop .ci{padding:13px;border-top:1px solid var(--line);display:flex;gap:8px}
  .cop .ci input{flex:1;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font:inherit;outline:0}
  .ph-hero{width:54px;height:54px;border-radius:14px;background:var(--brand-soft);display:grid;place-items:center;margin:0 auto 16px}
  .ph-hero svg{width:26px;height:26px;stroke:var(--brand)}
</style>
</head>
<body>
<div id="root"></div>
<button class="cop-btn" onclick="document.getElementById('cop').classList.add('on')"></button>
<div class="cop" id="cop"></div>

<script>
/* ---------- icons ---------- */
const ICONS={
  grid:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
  layers:'<path d="M12 2 2 7l10 5 10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>',
  check:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  wand:'<path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/><path d="M19 15v4M21 17h-4M5 4v2M6 5H4"/>',
  target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/>',
  chart:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="7"/><rect x="12" y="7" width="3" height="11"/><rect x="17" y="4" width="3" height="14"/>',
  gear:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 2.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H7a1.6 1.6 0 0 0 1-1.5V1a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V7a1.6 1.6 0 0 0 1.5 1H23a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/>',
  flag:'<path d="M4 22V4M4 4h13l-2 4 2 4H4"/>',
  cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',
  up:'<path d="M7 17 17 7M9 7h8v8"/>',
  down:'<path d="M7 7l10 10M17 9v8H9"/>',
  trend:'<path d="M3 17l6-6 4 4 7-7"/><path d="M17 8h4v4"/>',
  alert:'<path d="M10.3 3.6 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.6a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h0"/>',
  box:'<path d="M21 8 12 3 3 8l9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/>',
  cap:'<path d="M4 16a8 8 0 1 1 16 0"/><path d="M12 16l3.5-3.5"/>',
  flash:'<path d="M13 2 4 14h7l-1 8 9-12h-7z"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>',
  filter:'<path d="M3 4h18l-7 8v6l-4 2v-8z"/>',
  cols:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  back:'<path d="M15 18l-6-6 6-6"/>',
  coin:'<circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5h4a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3h4"/>',
  arrow:'<path d="M5 12h14M13 6l6 6-6 6"/>',
  minus:'<circle cx="12" cy="12" r="9"/><path d="M8 12h8"/>',
  send:'<path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/>'
};
function ic(n,c){return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="'+(c||'currentColor')+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||'')+'</svg>';}
function dot(c){return '<span class="d" style="background:'+c+'"></span>';}
function acl(t){return t==='g'?'acos-good':t==='a'?'acos-mid':'acos-bad';}
function barc(t){return t==='g'?'var(--green)':t==='a'?'var(--amber)':'var(--red)';}
function profitColor(p){return String(p).startsWith('-')?'var(--red)':(p==='€0'||p==='—')?'var(--ink3)':'#6d28d9';}

/* ---------- row builders ---------- */
function moverRow(name,mkt,spend,sales,acos,profit,score,tone){
  return '<tr><td class="l"><span class="cname">'+name+'</span></td>'
    +'<td><span class="cc az">'+dot('var(--az)')+mkt+'</span></td>'
    +'<td class="num">'+spend+'</td><td class="num">'+sales+'</td>'
    +'<td><span class="'+acl(tone)+'">'+acos+'%</span></td>'
    +'<td><span style="color:#6d28d9;font-weight:700">'+profit+'</span></td>'
    +'<td><span class="bar"><i style="width:'+score+'%;background:'+barc(tone)+'"></i></span></td></tr>';
}
function mult(v){var pos=String(v).startsWith('+');return '<span class="mult '+(pos?'pos':'')+'">'+v+'</span>';}
function campRow(name,status,type,mkt,budget,spend,sales,acos,tone,profit,tos,pdp,ros){
  return '<tr><td class="l"><input type="checkbox" onclick="toggleBulk()"/></td>'
    +'<td class="l"><div class="cname" style="cursor:pointer" onclick="go(\'cockpit\',null)">'+name+'</div></td>'
    +'<td>'+(status==='Paused'?'<span class="pill n">Paused</span>':'<span class="pill g">Enabled</span>')+'</td>'
    +'<td><span class="cc az">'+dot('var(--az)')+type+'</span></td><td>'+mkt+'</td>'
    +'<td class="num">'+budget+'</td><td class="num">'+spend+'</td><td class="num">'+sales+'</td>'
    +'<td><span class="'+acl(tone)+'">'+acos+'%</span></td>'

/* ---------- interactions ---------- */
function go(v,el){
  document.querySelectorAll('.view').forEach(function(x){x.classList.remove('on');});
  var map={dash:'v-dash',camp:'v-camp',sug:'v-sug',auto:'v-auto',comp:'v-comp',ana:'v-ana',set:'v-set',cockpit:'v-cockpit',launch:'v-launch'};
  document.getElementById(map[v]).classList.add('on');
  var titles={dash:['Dashboard','Last 30 days · all markets'],camp:['Campaigns','Ad Manager · 169 campaigns · Amazon'],sug:['Suggestions','18 pending · est. +€2,340/mo'],auto:['Automation','Rules · Goals · Dayparting'],comp:['Competitive','Share of Voice · competitor moves'],ana:['Analytics','Trends · profit · search terms'],set:['Settings','Connections · gates · budgets'],cockpit:['Campaign','SP · Giacca Pelle Nera · Exact'],launch:['Launch a product','Goal-based campaign creation']};
  document.getElementById('ttl').textContent=titles[v][0];
  document.getElementById('sub').textContent=titles[v][1];
  var navmap={dash:0,camp:1,sug:2,auto:3,comp:4,ana:5,set:6};
  document.querySelectorAll('.nav a').forEach(function(a){a.classList.remove('on');});
  if(navmap[v]!=null) document.querySelectorAll('.nav a')[navmap[v]].classList.add('on');
  document.querySelector('.scroll').scrollTop=0;
}
function campView(m,el){
  document.querySelectorAll('#v-camp .seg button').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  document.getElementById('camp-c').style.display=m==='c'?'':'none';
  document.getElementById('camp-p').style.display=m==='p'?'':'none';
}
function toggleBulk(){
  var n=document.querySelectorAll('#camp-c tbody input[type=checkbox]:checked').length;
  var tb=document.getElementById('bulkbar');
  tb.style.display=n>0?'flex':'none';
  tb.querySelector('b').textContent=n+' selected';
}
function expand(el){
  var r=el.closest('tr').nextElementSibling;
  if(r&&r.classList.contains('subrow')){
    var open=r.style.display!=='none';
    r.style.display=open?'none':'';
    el.innerHTML=open?'&#9656;':'&#9662;';
  }
}
function sugTab(i,el){
  document.querySelectorAll('.sugtab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  var names=['Bid changes','Match-type graduations','New keywords','Negatives','Budget','Retail-pause'];
  document.getElementById('sug-title').textContent=names[i];
  document.getElementById('sug-bids').style.display=i===0?'':'none';
  document.getElementById('sug-grad').style.display=i===1?'':'none';
  document.getElementById('sug-other').style.display=i>1?'':'none';
}
function approve(el){
  var r=el.closest('.sugrow');
  r.style.transition='.25s';r.style.opacity='0';r.style.transform='translateX(20px)';
  setTimeout(function(){r.style.display='none';},250);
}
</script>
